serenity {
 take.screenshots = AFTER_EACH_STEP
   restart.browser.each.scenario = true
   timeout = 10000
   outputDirectory = "report/serenity"
   use.unique.browser = false
  reports.show.step.details = true
}

# Environment-specific configuration.
# Select environment via: mvn test -Denvironment=local|test|stage
environments {
  default {
    base.url = "https://jsonplaceholder.typicode.com"
    api.url  = "https://jsonplaceholder.typicode.com"
    browser  = "chrome"
  }

  local {
    base.url = "http://localhost:3000"
    api.url  = "http://localhost:8080"
    browser  = "chrome"
    headless = false
  }

  test {
    base.url = "https://jsonplaceholder.typicode.com"
    api.url  = "https://jsonplaceholder.typicode.com"
    browser  = "chrome"
    headless = true
  }

  stage {
    base.url = "https://stage.example.com"
    api.url  = "https://api.stage.example.com"
    browser  = "chrome"
    headless = true
  }
}

webdriver {
  driver = chrome
  autodownload = true
}

headless.mode = false
