serenity {
 take.screenshots = AFTER_EACH_STEP
   restart.browser.each.scenario = true
   timeout = 10000
   outputDirectory = "report/serenity"
   use.unique.browser = false
  reports.show.step.details = true
}
webdriver {
  driver = chrome
  autodownload = true

  capabilities {
      browserName = "Chrome"

      "goog:chromeOptions" {
        args = ["--start-maximized" ]
        detach = true
        localState = {
          cart-contents = [1,2,3]
        }
      }
    }
}

